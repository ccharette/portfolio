<!DOCTYPE html>
<html lang="">
<head>
  <meta charset="UTF-8">
  <link href="/favicon.ico" rel="icon">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Vite App</title>
  <script>
    (function () {
      const isDark =
        localStorage.theme === 'dark' ||
        (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);

      console.debug('isDark', isDark);
      
      window.__INITIAL_THEME__ = isDark ? 'dark' : 'light';

      if (isDark) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      
      window.onbeforeunload = function () {
        window.scrollTo(0, 0);
      }
    })();
  </script>
  <script crossorigin="anonymous" src="https://kit.fontawesome.com/a7f0aec245.js"></script>
</head>
<body class="dark bg-stone-50  bg-linear-to-b from-gray-50 to-white px-6 py-32 dark:from-stone-900 dark:to-stone-950 transition-colors duration-300">
<div id="header"></div>
<div id="app"></div>
<div id="ui-layer"></div>
<script src="/src/main.js" type="module"></script>
</body>
</html>
